          description: Autentificación fallida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalResponseSchema'
              example:
                success: false
                status: 401
                message: "No estás autentificado. El token puede haber expirado"
                error: "Invalid Token"
        '404':
          description: Error al actualizar un usuario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalResponseSchema'
              example:
                success: false
                status: 404
                message: "No se han encotrado usuarios cuyo identificador coincida con el esperado"
                error: "Data Not Found"
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
