openapi: 3.1.0
info:
  title: Paw-Meet API
  description: API para la red social Paw-Meet. Protegida mediante JWT Bearer.
  version: 1.0.0
  contact:
    email: amendoma@alumnos.unex.es
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: http://localhost:8000
  - url: http://localhost:3000

tags:
  - name: Usuario
  - name: Social
  - name: Encuentros
  - name: Administrador

security:
  - BearerAuth: []

paths:

  /api/registro:
    post:
      tags:
        - Usuario
      summary: Registro de usuario
      description: Registra un usuario en el sistema.
      security: [] 
      operationId: registro
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Registro'
      responses:
        '201':
          description: Usuario registrado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalResponseSchema'
              example:
                success: true
                status: 201
                message: "Registro realizado correctamente"
        '400':
          description: Problemas con el cuerpo de la petición
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalResponseSchema'
              example:
                success: false
                status: 400
                message: "Existen errores en el cuerpo de la petición"
                error: "Bad Request"
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalResponseSchema'
              example:
                success: false
                status: 500
                message: "Error interno del servidor"
                error: "Internal Server Error"

  /api/login:
    post:
      tags:
        - Usuario
      summary: Login de usuario
      description: Devuelve un token JWT para autenticación.
      security: [] 
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
      responses:
        '200':
          description: Login correcto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Credenciales incorrectas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalResponseSchema'
              example:
                success: false
                status: 401
                message: "Las credenciales indicadas en el cuerpo de la peticion son incorrectas"
                error: "Invalid Credentials"
        '404':
          description: Usuario no registrado en el sistema
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalResponseSchema'
              example:
                success: false
                status: 404
                message: "Las credenciales del usuario indicado no se encuetran registradas en el sistema. Regístrate"
                error: "Data Not Found"
        '500':
          description: Error internos del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalResponseSchema'
              example:
                success: false
                status: 500
                message: "Error interno del servidor"
                error: "Internal Server Error"

  /api/user:
    patch:
      tags:
        - Usuario
      summary: Actualizar perfil de usuario
      description: Permite modificar datos del usuario autenticado.
      operationId: updateUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUser'
      responses:
        '200':
          description: Perfil actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalResponseSchema'
              example:
                success: true
                status: 200
                message: "Información sobre usuario actualizada correctamente"
        '400':
          description: Campos incorrectos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalResponseSchema'
              example:
                success: false
                status: 400
                message: "Los campos definidos en el cuerpo de la peticion son incorrectos"
                error: "Bad Request"
        '401':
          description: Autentificación fallida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalResponseSchema'
              example:
                success: false
                status: 401
                message: "No estás autentifcado en el sistema. El token puede estar caducado"
                error: "Invalid Token"
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalResponseSchema'
              example:
                success: false
                status: 404
                message: "No se ha encontrado el usuario para actualizar sus campos"
                error: "Data Not Found"
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalResponseSchema'
              example:
                success: false
                status: 500
                message: "Error interno del servidor"
                error: "Internal Server Error"
                

  /api/user/mascota:
    post:
      tags:
        - Usuario
      summary: Registrar mascota
      description: Registra una mascota asociada al usuario autenticado.
      operationId: registrarMascotas
      requestBody:
        $ref: '#/components/requestBodies/MascotaCreateBody'
      responses:
        '201':
          description: Mascota registrada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalResponseSchema'
              example:
                success: true
                status: 201
                message: "Mascota registrada correctamente en el sistema"
        '400':
          description: Campos incorrectos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalResponseSchema'
              example:
                success: false
                status: 400
                message: "Los campos indicados en el cuerpo de la petición no son los correctos"
                error: "Bad Request"
        '401':
          description: Autentificación fallida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalResponseSchema'
              example:
                success: false
                status: 401
                message: "No estás autentifcado en el sistema. El token puede estar caducado"
                error: "Invalid Token"
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalResponseSchema'
              example:
                success: false
                status: 500
                message: "Error interno del servidor"
                error: "Internal Server Error"
        
    get:
      tags:
        - Usuario
      summary: Obtener mascotas del usuario
      description: Devuelve las mascotas del usuario autenticado.
      operationId: getMascotas
      responses:
        '200':
          description: Lista de mascotas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Mascota'
        '401':
          description: Autentificación fallida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalResponseSchema'
              example:
                success: false
                status: 401
                message: "No estás autentificado en el sistema. El token puede estar caducado"
                error: "Invalid Token"
        '404':
          description: Usuario sin mascotas registradas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalResponseSchema'
              example:
                success: false
                status: 404
                message: "El usuario no tiene mascotas registradas"
                error: "Data Noy Found"
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalResponseSchema'
              example:
                success: false
                status: 500
                message: "Error interno del servidor"
                error: "Internal Server Error"
  
