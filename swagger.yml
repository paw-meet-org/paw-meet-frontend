components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  requestBodies:

    ForoCreateBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TemasBase'

    MascotaCreateBody:
      required: true
      content:
        application/json:
          schema: 
            $ref: '#/components/schemas/MascotasBase'

    UsuarioCreateBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UsuarioBase'

    UsuarioUpdate:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UsuarioBase'

    SponsorCreateBody:
      required: true
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/SponsorBase'
              - type: object
                required:
                  - username
                  - password
                  - email
                  - NIF
    SponsorUpdate:
        required: true
        content:
          application/json:
              schema:
                $ref: '#/components/schemas/SponsorBase'


    PublicacionesCreateBody:
      required: true
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/PublicacionesBase'
              - required:
                - titulo
                - texto
    
    TipoMascotaCreateBody:
      required: true
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/TipoMascotaBase'
                required:
                  - nombre
                  - codigo


    CiudadCreateBody:
      required: true
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/CiudadBase'
                required:
                  - nombre
                  - codigo

    AsistenciaCreateBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AsistenciaBase'

    EncuentroCreateBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EncuentrosBase'
    
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      description: Identificador de la entidad
      schema:
        type: string

  schemas:
    
    MascotasBase:
      type: object
      properties:
        nombre:
          type: string
          example: "Huesos"
        raza:
          $ref: '#/components/schemas/TipoMascotaBase'
        descripcion:
          type: string
          example: "Perro agresivo"
        foto:
          type: string
          format: binary

    GlobalResponseSchema:
      type: object
      required:
        - success
        - status
        - message
      properties:
        success:
          type: boolean
          example: true
        status:
          type: integer
          example: 200
        message:
          type: string
          example: "Operación realizada correctamente"
        error:
          type: string
          example: "Bad Request"

    AsistenciaBase:
      type: object
      required:
        - contador_usuarios
        - contador_mascotas
      properties:
        contador_usuarios:
          type: integer
          example: 10
        contador_mascotas:
          type: integer
          example: 7
        nota:
          type: string
          example: "Evento tranquilo"

    EncuentrosBase:
      type: object
      properties:
        fecha:
          type: string
          format: date
          example: "2026-01-01"
        localizacion:
          type: string
          example: "Plaza Mayor"
        tipo_animal:
          type: array
          items:
              type: string
          example: ["Perros", "Gatos"]
        limite_usuarios:
          type: integer
          minimum: 0
          maximum: 10
          default: 5
        duracion_minutes:
          type: integer
          example: 60
        descripcion:
          type: string
          example: "Encuentro solidario"
        titulo:
          type: string
          example: "Solitae"

    Encuentro:
      allOf:
        - $ref: '#/components/schemas/EncuentroBase'
        - type: object
          properties:
            asistencias:
              $ref: '#/components/schemas/AsistenciaBase'

    ForoBase:
      type: object
      properties:
        tipo_foro:
          type: string
          example: "Consultoría"
        titulo:
          type: string
          example: "Consultorias Paw-Meet"
        publicaciones:
          type: array
          items:
            $ref: '#/components/schemas/PublicacionesBase'
        temas:
          type: array
          items:
            $ref: '#/components/schemas/TemasBase'
        
    TemasBase:
      type: object
      properties:
        nombre:
          type: string
          example: "Enfermedades"
        foro:
          type: string
          example: "cf359bb6-bd5d-4edb-ba8b-31ca877de232"
      
    PublicacionesBase:
      type: object
      properties:
        titulo:
          type: string
          example: "Habitos diarios"
        texto:
          type: string
          example: "¿Cuales so vuestros hábitos diarios al paseas a vuestras mascotas? El mio..."
        foto:
          type: string
          format: binary
        fecha_creacion:
          type: string
          format: datetime
        likes:
          type: integer
          example: 0

    UsuarioBase:
      type: object
      properties:
        username:
          type: string
          example: "Alvaro"
        email:
          type: string
          example: "amendoma@alumnos.unex.es"
        biography:
          type: string
          example: "Simpatico"
        foto:
          type: string
          format: binary
        ciudad:
          type: string
          example: "Caceres"

    CiudadBase:
      type: object
      properties:
        nombre:
          type: string
          example: "Caceres"
        codigo:
          type: string
          example: "CC"

    SponsorBase:
      type: object
      properties:
        username:
          type: string
          example: "ep"
        password:
          type: string
          example: "5432"
        email:
          type: string
          example: "uex@alumnos.unex.es"
        nombre:
          type: string
          example: "Escuela Politecnica"
        activo:
          type: boolean
          example: true
        NIF:
          type: string
          example: "Q0618001B"

    Usuario:
      allOf:
        - $ref: '#/components/schemas/UsuarioBase'

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        token_type:
          type: string
          example: "Bearer"
        expires_in:
          type: integer
          example: 3600

    Login:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: "Peterbot"
        password:
          type: string
          example: "abc1234"

    Registro:
      type: object
      required:
        - nombre
        - correo_electronico
        - password
      properties:
        nombre:
          type: string
          example: "Peterbot"
        correo_electronico:
          type: string
          format: email
          example: "correo@email.com"
        password:
          type: string
          example: "abcd1234"
        biografia:
          type: string
          example: "Amante de los animales"
        foto:
          type: string
          format: binary

    UpdateUser:
      type: object
      properties:
        nombre:
          type: string
          example: "Alvaro"
        biografia:
          type: string
          example: "Nueva bio"
        foto:
          type: string
          format: binary

    RegistroMascota:
      type: object
      required:
        - nombre
        - tipo
      properties:
        nombre:
          type: string
          example: "Huesos"
        tipo:
          $ref: '#/components/schemas/TipoMascotaBase'

    Mascota:
      type: object
      properties:
        nombre:
          type: string
          example: "Huesos"
        tipo:
          $ref: '#/components/schemas/TipoMascotaBase'

    TipoMascotaBase:
      type: object
      properties:
        nombre:
          type: string
          example: "Canino"
        codigo:
          type: string
          example: "R01"